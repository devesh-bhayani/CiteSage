name: test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: |
          uv run ruff check src/
          uv run black --check --target-version py311 src/

      # Integration tests download the sentence-transformers models (~170 MB)
      # on first run; cache them across CI runs.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('config.yaml') }}

      # The eval job (run_eval) is deliberately NOT run here: it needs a live
      # Ollama daemon or funded Anthropic credits. CI gates on unit +
      # integration only (LLM calls are stubbed in integration tests).
      - name: Run tests
        run: uv run pytest tests/unit tests/integration -q
