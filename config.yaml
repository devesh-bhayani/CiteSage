project:
  name: citesage
  version: "0.1.0"

provider: "ollama"  # "anthropic" or "ollama"

models:
  # Current active: Ollama (offline). Switch provider to "anthropic" and the
  # generator/grader below to claude-sonnet-4-20250514 / claude-haiku-4-5-20251001
  # to meet the Phase 3 latency SLO.
  generator: "qwen3:8b"
  grader: "qwen3-small:latest"
  embedder: "all-MiniLM-L6-v2"
  reranker: "cross-encoder/ms-marco-MiniLM-L-6-v2"

chunking:
  default:
    size: 600
    overlap: 100
    strategy: "recursive"

retrieval:
  vector_top_k: 20
  bm25_top_k: 20
  # How many RRF-fused candidates to feed into the cross-encoder.
  rerank_candidates: 15
  # Final number of results returned to the generation layer.
  rerank_top_k: 5
  rrf_k: 60
  # Threshold for raw cosine similarity from the vector store (all-MiniLM-L6-v2
  # scores rarely exceed 0.55 for relevant passages; 0.3 is a good floor).
  vector_score_threshold: 0.3
  # Threshold applied to the cross-encoder reranker score (Phase 2+).
  # Raised to 0.8 in Phase 3 tuning — pushes more queries to the fast path so
  # the thorough-path LLM chain isn't the p95 bottleneck.
  confidence_threshold: 0.8
  # Cross-encoder scores below this are treated as clearly irrelevant; the
  # pipeline declines without an LLM grading call.
  # ms-marco scores for unrelated content cluster around -10 to -12.
  # Tightened from -5.0 → -3.0 in Phase 3 tuning: unanswerable questions
  # cluster in the -5..-3 band and were slipping into the thorough path.
  decline_threshold: -3.0

prompts:
  version: "v1"
  path: "src/citesage/prompts"

paths:
  chroma_db: "data/chroma"
  bm25_index: "data/bm25_index.pkl"
  documents: "data/documents"

pricing:
  claude-sonnet-4-20250514:
    input_per_million: 3.0
    output_per_million: 15.0
  claude-haiku-4-5-20251001:
    input_per_million: 0.25
    output_per_million: 1.25
  qwen3:8b:
    input_per_million: 0.0
    output_per_million: 0.0
  qwen3-small:latest:
    input_per_million: 0.0
    output_per_million: 0.0
